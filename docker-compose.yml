services:
  olow:
    build: .
    ports:
      - "5001:5001"
    environment:
      - CHATBOT_ENV=LOCAL_DOCKER
    depends_on:
      - mongo
      - redis
    networks:
      - dev-net

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - dev-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - dev-net

volumes:
  mongo-data:

networks:
  dev-net:
