services:
  olow:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - CHATBOT_ENV=LOCAL_DOCKER
      - SERVER_PORT=3001
      - MONGO_HOST=mongo
      - REDIS_HOST=redis
    depends_on:
      - mongo
      - redis
    networks:
      - dev-net

  mongo:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - dev-net

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    networks:
      - dev-net

volumes:
  mongo-data:

networks:
  dev-net:
