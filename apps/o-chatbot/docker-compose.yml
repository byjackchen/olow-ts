services:
  o-chatbot:
    build:
      context: ../..
      dockerfile: apps/o-chatbot/Dockerfile
    ports:
      - "3070:3000"
    env_file:
      - .env
    volumes:
      - ./config:/app/apps/o-chatbot/config:ro
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  mongo-data:
  redis-data:
