name: olow-ts-chatbot

services:
  chatbot:
    build:
      context: ../..
      dockerfile: apps/olow-chatbot/Dockerfile
    ports:
      - "3070:3000"
    env_file:
      - .env
    environment:
      - MONGO_HOST=mongo
      - REDIS_HOST=redis
    volumes:
      - ./config:/app/apps/olow-chatbot/config:ro
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  web-ui:
    build:
      context: web-ui
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - chatbot
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27020:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    volumes:
      - redis-data:/data

volumes:
  mongo-data:
  redis-data:
