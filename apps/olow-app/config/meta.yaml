space: "OIT"
version: "1.0.0: TypeScript Reimplementation"

# Engine
engine:
  max_event_loops: 30
  click_valid_timelapse_seconds: 1800
  user_context_buffer_seconds: 259200 # 3 days
  greeting_silent_seconds: 3600 # 1 hour
  recent_queries_cutoff_seconds: 900 # 15 mins
  rolling_requests_threshold: 60
  admin_chatgroup_id: ""
  post_msg_verbose: false
  base_llm_provider: "openai"
  base_llm_model: "llm_gpt5_nano"
  react_agent:
    intent_mode: "multi-turns"
    max_rounds: 5
    retrieval_threshold: 0.64
  memory:
    settings_expire_seconds: 259200
    actionchain_expire_seconds: 300
    graph_max_sessions: 3
    graph_nodes_max_tokens: 6000
  logging:
    app_log_path: "./logs/app.log"
    max_size_mb: 100
    backup_count: 5
    base_log_level: "info"
  developers: []
  administrators: []

# MCP
mcp_server:
  enabled: false
mcp_client:
  enabled: false
  servers: []

# Server
server:
  host: "0.0.0.0"
  port: 5001

# Auth
auth:
  api_token: "f0b03b9a126f7b45018521bbce6587e3"

# MongoDB
mongo:
  host: "localhost"
  port: 27017
  database: "oitbot"
  username: ""
  password: ""

# Redis
redis:
  host: "localhost"
  port: 6379
  password: ""
  keys:
    peak_shaving: "peak_shaving"
    taiji_rotation: "taiji_rotation"

# HTTP Client
http_client:
  timeout: 30000

# Error Handling
error_handling:
  retry_count: 1
  retry_delay_ms: 500

# Broker
broker:
  expiretime_offset_seconds: 120

# WeCom
wecom_bot:
  token: ""
  aes_key: ""
  service_id: ""
  corp_id: ""
  corp_secret: ""
  text_msg_bytes_limit: 4750
  richtext_msg_bytes_limit: 4000

# WeCom GroupBot
wecom_groupbot:
  token: ""
  aes_key: ""
  service_id: ""

# Slack
slack:
  bot_user_oauth_token: ""
  app_level_token: ""

# Hyaide
hyaide:
  url: ""
  token: ""
  admin_user_token: ""
  wsid: ""
  polaris:
    enabled: false
    namespace: ""
    service: ""
    fallback_url: ""
  faq_agent_id: ""
  faq_index_id: ""
  intent_agent_id: ""
  intent_index_id: ""
  article_agent_id: ""
  article_index_id: ""
  llm_tokens: []
  llmDeepseekV32_32k:
    name: "DeepSeek-V3_2-Online-32k"
    max_tokens: 32000
  llmDeepseekV3_16k:
    name: "DeepSeek-V3-Online-16K"
    max_tokens: 16000

# OpenAI
openai:
  api_domain: "https://api.openai.com"
  api_key: ""
  llm_gpt5_nano:
    name: "gpt-5-nano"
    max_tokens: 400000
    max_completion_tokens: 10000
  llm_gpt5_mini:
    name: "gpt-5-mini"
    max_tokens: 400000
    max_completion_tokens: 10000
  llm_gpt5_2:
    name: "gpt-5.2"
    max_tokens: 400000
    max_completion_tokens: 10000

# Hunyuan
hunyuan:
  url_domain: ""
  auth_token: ""
  models:
    audio_realtime: "hunyuan-asr-realtime-20250707"
    ocr: "hunyuan-ocr"

# Workday
workday:
  tenant_alias: ""
  client_id: ""
  client_secret: ""
  url_token: ""
  url_wql: ""

# ServiceNow
servicenow:
  url_domain: ""
  username: ""
  password: ""
  contact_type: "Wecom"
  ticket_placeholder_id: ""
  ticket_monitor_account_id: ""
  ticket_open_states: ["1", "2", "3", "6"]
  ticket_states:
    wildcard: "-1"
    new: "1"
    inprogress: "2"
    onhold: "3"
    proposed: "6"
    closed: "7"

# Statistics
statistics:
  time_interval: 900
  prob_new_topic: 0
